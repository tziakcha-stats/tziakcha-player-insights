# build latest v* tag and publish production release.
name: release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Package dist
        run: |
          cd dist
          zip -r ../tziakcha-player-insights-${{ github.ref_name }}.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ github.ref_name }}
          path: |
            ./dist
            ./tziakcha-player-insights-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: ./tziakcha-player-insights-${{ github.ref_name }}.zip
          generate_release_notes: true
