# build latest v* tag and publish production release.
name: release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  meta:
    name: Collect release metadata
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.release-meta.outputs.is_prerelease }}
    steps:
      - name: Detect prerelease tag
        id: release-meta
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build release package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Package dist
        run: |
          cd dist
          zip -r ../tziakcha-player-insights-${{ github.ref_name }}.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ github.ref_name }}
          path: |
            ./dist
            ./tziakcha-player-insights-${{ github.ref_name }}.zip
          if-no-files-found: error

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: >-
            -vv --latest --strip header
            ${{ needs.meta.outputs.is_prerelease == 'false' && '--tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+$"' || '' }}
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    name: Publish release
    needs:
      - build
      - changelog
      - meta
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: release-dist-${{ github.ref_name }}
          path: ./release-assets

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ needs.changelog.outputs.release_body }}
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}
          files: ./release-assets/tziakcha-player-insights-${{ github.ref_name }}.zip
