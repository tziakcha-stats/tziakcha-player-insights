name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'wiki/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build userscript
        run: |
          npm ci
          npm run build

      - name: Validate userscript build output
        run: test -f dist/index.prod.user.js

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r wiki/requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Attach userscript assets
        run: |
          mkdir -p site/preview
          cp dist/index.prod.user.js site/index.prod.user.js
          cp dist/index.prod.user.js site/preview/index.prod.user.js
          touch site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
