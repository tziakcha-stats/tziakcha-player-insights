name: release-version

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix, for example 2.2.6
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Validate version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $INPUT_VERSION" >&2
            exit 1
          fi

      - name: Update package versions
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: npm version "$INPUT_VERSION" --no-git-tag-version --allow-same-version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git add package.json package-lock.json
          git commit -m "chore: 更新版本号至 ${INPUT_VERSION} [skip changelog]"

      - name: Recreate version tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          TAG_NAME="v${INPUT_VERSION}"
          git fetch --tags origin
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            git tag -d "$TAG_NAME"
          fi
          if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q "${TAG_NAME}$"; then
            git push origin ":refs/tags/${TAG_NAME}"
          fi
          git tag "$TAG_NAME"

      - name: Push commit and tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git push origin HEAD:master
          git push origin "v${INPUT_VERSION}"
