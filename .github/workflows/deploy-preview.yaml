# this workflow builds preview assets when code changes.

name: deploy-preview

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-preview.yaml'
  pull_request:
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-preview.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Upload preview dist
        uses: actions/upload-artifact@v4
        with:
          name: preview-dist-${{ github.sha }}
          path: ./dist
          if-no-files-found: error
          retention-days: 7
