# this workflow builds preview assets when code changes.

name: deploy-preview

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-preview.yaml'
  pull_request:
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-preview.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build userscript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Validate userscript build output
        run: test -f dist/index.prod.user.js

      - name: Upload preview userscript
        uses: actions/upload-artifact@v4
        with:
          name: preview-userscript-${{ github.sha }}
          path: ./dist/index.prod.user.js
          if-no-files-found: error
          retention-days: 7

  publish-preview-branch:
    name: Publish preview-dist branch
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download userscript artifact
        uses: actions/download-artifact@v5
        with:
          name: preview-userscript-${{ github.sha }}
          path: ./preview-asset

      - name: Publish userscript files
        env:
          PREVIEW_BRANCH: preview-dist
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          PREVIEW_WORKTREE=".preview-dist-worktree"
          rm -rf "$PREVIEW_WORKTREE"

          if git ls-remote --exit-code --heads origin "$PREVIEW_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$PREVIEW_BRANCH"
            git worktree add "$PREVIEW_WORKTREE" "origin/$PREVIEW_BRANCH"
          else
            git worktree add --detach "$PREVIEW_WORKTREE"
            (
              cd "$PREVIEW_WORKTREE"
              git checkout --orphan "$PREVIEW_BRANCH"
            )
          fi

          find "$PREVIEW_WORKTREE" -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          mkdir -p "$PREVIEW_WORKTREE/greasyfork"
          cp ./preview-asset/index.prod.user.js "$PREVIEW_WORKTREE/index.prod.user.js"
          cp ./preview-asset/index.prod.user.js "$PREVIEW_WORKTREE/greasyfork/script.user.js"
          touch "$PREVIEW_WORKTREE/.nojekyll"

          (
            cd "$PREVIEW_WORKTREE"
            if [ -n "$(git status --porcelain)" ]; then
              git add -A
              git commit -m "chore(preview): update userscript for $GITHUB_SHA"
              git push origin HEAD:"$PREVIEW_BRANCH"
            else
              echo "No userscript changes; skip push."
            fi
          )

          git worktree remove "$PREVIEW_WORKTREE" --force
