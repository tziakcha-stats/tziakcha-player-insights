# this workflow builds preview assets when code changes.

name: deploy-preview

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-preview.yaml'
  pull_request:
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-preview.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Publish preview-dist branch
        if: github.event_name != 'pull_request'
        env:
          PREVIEW_BRANCH: preview-dist
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          PREVIEW_WORKTREE=".preview-dist-worktree"
          rm -rf "$PREVIEW_WORKTREE"

          if git ls-remote --exit-code --heads origin "$PREVIEW_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$PREVIEW_BRANCH"
            git worktree add "$PREVIEW_WORKTREE" "origin/$PREVIEW_BRANCH"
          else
            git worktree add --detach "$PREVIEW_WORKTREE"
            (
              cd "$PREVIEW_WORKTREE"
              git checkout --orphan "$PREVIEW_BRANCH"
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi

          rsync -a --delete --exclude ".git" dist/ "$PREVIEW_WORKTREE/"
          touch "$PREVIEW_WORKTREE/.nojekyll"

          (
            cd "$PREVIEW_WORKTREE"
            if [ -n "$(git status --porcelain)" ]; then
              git add -A
              git commit -m "chore(preview): update dist for $GITHUB_SHA"
              git push origin HEAD:"$PREVIEW_BRANCH"
            else
              echo "No changes in preview dist; skip push."
            fi
          )

          git worktree remove "$PREVIEW_WORKTREE" --force

      - name: Upload preview dist
        uses: actions/upload-artifact@v4
        with:
          name: preview-dist-${{ github.sha }}
          path: ./dist
          if-no-files-found: error
          retention-days: 7
